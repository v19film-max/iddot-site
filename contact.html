<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — iddot</title>
<meta name="description" content="iddot 프로젝트 문의">
<link rel="icon" href="assets/symbol_final.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="contact.css">
<script>document.documentElement.className+=' js';</script>
</head>
<body class="contact-page">

<div id="raysBg" class="rays-bg" aria-hidden="true"></div>

<header class="nav">
  <a href="index.html" class="nav-mark" aria-label="iddot 홈">
    <img src="assets/wordmark.png" alt="iddot">
  </a>
  <nav class="nav-menu">
    <a href="index.html#work">Work</a>
    <a href="index.html#about">About</a>
    <a href="contact.html" class="is-current">Contact</a>
  </nav>
</header>

<main>
  <section class="c-hero">
    <p class="section-idx">03 — Contact</p>
    <h1 class="display" data-split="chars">CONTACT</h1>
    <p class="c-hero-sub">프로젝트를 들려주시면, 가장 좋은 방향을 찾아 답합니다.</p>
  </section>

  <section class="c-form-wrap">
    <div id="stepper" class="stepper" data-step="1">

      <div class="stepper-dots" role="tablist" aria-label="문의 단계">
        <span class="dot is-on" data-dot="1">1</span><i></i>
        <span class="dot" data-dot="2">2</span><i></i>
        <span class="dot" data-dot="3">3</span><i></i>
        <span class="dot" data-dot="4">4</span>
      </div>

      <form id="inquiryForm" novalidate>
        <input type="hidden" name="_subject" value="[iddot 문의] 새 프로젝트">

        <!-- STEP 1 : 누구신가요 -->
        <fieldset class="step is-on" data-step="1">
          <p class="step-label">01 — 누구신가요</p>
          <label>
            <span>이름 / 회사<i>*</i></span>
            <input type="text" name="name" required autocomplete="organization" placeholder="예: 홍길동 / OO브랜드">
          </label>
          <label>
            <span>연락처<i>*</i></span>
            <input type="text" name="contact" required placeholder="이메일 또는 전화번호">
          </label>
        </fieldset>

        <!-- STEP 2 : 무엇을 만들까요 -->
        <fieldset class="step" data-step="2">
          <p class="step-label">02 — 무엇을 만들까요</p>
          <div class="chip-group" data-name="type">
            <button type="button" class="chip">시네마틱 필름</button>
            <button type="button" class="chip">뮤직비디오</button>
            <button type="button" class="chip">브랜드 콘텐츠</button>
            <button type="button" class="chip">유튜브 · 디지털</button>
            <button type="button" class="chip">전시 · 미술 세트</button>
            <button type="button" class="chip">브랜딩 · 비주얼 디렉팅</button>
            <button type="button" class="chip">기타</button>
          </div>
          <input type="hidden" name="type">
        </fieldset>

        <!-- STEP 3 : 규모 -->
        <fieldset class="step" data-step="3">
          <p class="step-label">03 — 대략적인 규모</p>
          <label>
            <span>예상 일정</span>
            <input type="text" name="schedule" placeholder="예: 3월 중 촬영">
          </label>
        </fieldset>

        <!-- STEP 4 : 내용 -->
        <fieldset class="step" data-step="4">
          <p class="step-label">04 — 자세히 들려주세요</p>
          <label>
            <span>내용<i>*</i></span>
            <textarea name="message" rows="6" required placeholder="구상하신 작업을 편하게 적어주세요."></textarea>
          </label>
        </fieldset>

        <p class="step-error" id="stepError" hidden></p>

        <div class="step-footer">
          <button type="button" class="step-back" id="stepBack" hidden>이전</button>
          <button type="button" class="spec-btn" id="stepNext">
            <span class="spec-btn__fx" aria-hidden="true"></span>
            <span class="spec-btn__label">다음</span>
          </button>
          <button type="submit" class="spec-btn" id="stepSubmit" hidden>
            <span class="spec-btn__fx" aria-hidden="true"></span>
            <span class="spec-btn__label">보내기</span>
          </button>
        </div>
        <p class="inq-note">보내주신 내용은 확인 후 빠르게 답변드리겠습니다.</p>
      </form>

      <div class="stepper-done" id="stepDone" hidden>
        <p class="section-idx">Thank you</p>
        <h2 class="display">잘 받았습니다</h2>
        <p>문의가 정상적으로 접수되었습니다. 빠르게 답 드리겠습니다.</p>
      </div>
    </div>
  </section>
</main>

<footer class="footer">
  <span>© 2026 iddot</span>
  <span>Creative Group</span>
</footer>

<script src="main.js"></script>
<script src="contact.js"></script>
<script src="scrollfloat.js"></script>
<script src="gradualblur.js"></script>
<script type="module" src="rays.js"></script>
</body>
</html>
